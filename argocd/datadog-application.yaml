apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: datadog
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/HOulcaid/gcp-gke-gitops/ # Replace with the URL of your gcp-gitops-project repository
    targetRevision: HEAD
    path: app/monitoring/datadog

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
