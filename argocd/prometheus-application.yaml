apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "57.0.3"
    helm:
      valuesObject:
        grafana:
          enabled: false
        alertmanager:
          enabled: false
        prometheus:
          service:
            type: ClusterIP
          prometheusSpec:
            storageSpec: {}
            retention: 6h
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                cpu: 300m
                memory: 768Mi
        prometheusOperator:
          resources:
            requests:
              cpu: 25m
              memory: 100Mi
            limits:
              cpu: 100m
              memory: 256Mi
        kubeStateMetrics:
          enabled: true
        nodeExporter:
          enabled: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
        kube-state-metrics:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true